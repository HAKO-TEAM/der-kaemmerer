<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="Helvetica, Arial, sans-serif">
  <rect width="1000" height="640" fill="#ffffff"/>

  <!-- Title -->
  <text x="60" y="58" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" fill="#1a2744">Die zweite Bilanz</text>
  <text x="60" y="90" font-size="17" fill="#64748b">Nur ein Bruchteil der kommunalen Schulden steht im Kernhaushalt &#8211; der Rest liegt in Auslagerungen.</text>

  <!-- Water band -->
  <rect x="60" y="250" width="470" height="330" fill="#eff6ff"/>

  <!-- Iceberg column: tip above water -->
  <rect x="150" y="150" width="200" height="100" fill="#1a2744"/>
  <text x="250" y="207" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Kernhaushalt</text>

  <!-- Below water segments -->
  <rect x="150" y="250" width="200" height="110" fill="#7f1d1d"/>
  <rect x="150" y="360" width="200" height="110" fill="#a62a2a"/>
  <rect x="150" y="470" width="200" height="110" fill="#c8991f"/>

  <!-- Waterline -->
  <line x1="60" y1="250" x2="530" y2="250" stroke="#1e3a8a" stroke-width="2.5" stroke-dasharray="9 6"/>
  <text x="60" y="242" font-size="12.5" font-weight="700" fill="#1e3a8a" letter-spacing="0.5">WAHRNEHMUNGSGRENZE &#183; OFFIZIELLE SCHULDENSTATISTIK</text>

  <!-- Right label: above water -->
  <text x="590" y="180" font-size="13" font-weight="700" fill="#1a2744" letter-spacing="0.6">IM KERNHAUSHALT AUSGEWIESEN</text>
  <text x="590" y="204" font-size="15" fill="#334155">Das, was die Aufsicht pr&#252;ft und die Statistik zeigt.</text>
  <text x="905" y="200" text-anchor="end" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#1a2744">&#8776; &#8531;</text>

  <!-- Bracket for below water -->
  <path d="M 370 250 h 14 v 330 h -14" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <text x="590" y="300" font-size="13" font-weight="700" fill="#7f1d1d" letter-spacing="0.6">IN AUSLAGERUNGEN VERBORGEN</text>
  <text x="905" y="322" text-anchor="end" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#7f1d1d">&#8776; &#8532;</text>

  <!-- Legend of hidden segments -->
  <rect x="590" y="345" width="18" height="18" fill="#7f1d1d"/>
  <text x="618" y="359" font-size="15" fill="#334155">Eigenbetriebe &amp; kommunale Gesellschaften</text>

  <rect x="590" y="390" width="18" height="18" fill="#a62a2a"/>
  <text x="618" y="404" font-size="15" fill="#334155">Zweckverb&#228;nde &amp; Beteiligungen</text>

  <rect x="590" y="435" width="18" height="18" fill="#c8991f"/>
  <text x="618" y="449" font-size="15" fill="#334155">&#214;PP, Leasing &amp; Kassenkredite der</text>
  <text x="618" y="469" font-size="15" fill="#334155">Nebenhaushalte</text>

  <!-- Footnote -->
  <line x1="60" y1="600" x2="940" y2="600" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="624" font-size="12.5" fill="#94a3b8">Schematische Darstellung; Anteile illustrativ und je Kommune verschieden. Kategorien nach Kern- und Extrahaushalten / &#246;ffentlichen FEU (Statistisches Bundesamt).</text>
</svg>
